<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .og-card {
            width: 1200px;
            height: 630px;
            background: linear-gradient(135deg, #0c0c1d 0%, #1a1a3e 50%, #2a1a4a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            top: -150px;
            left: -100px;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            bottom: -120px;
            right: -80px;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            top: 50%;
            left: 60%;
            transform: translate(-50%, -50%);
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 60px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 100px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 28px;
            backdrop-filter: blur(8px);
        }

        .name {
            font-size: 72px;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea 0%, #a78bfa 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.03em;
            line-height: 1.1;
            margin-bottom: 16px;
        }

        .role {
            font-size: 28px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 24px;
        }

        .stats {
            display: flex;
            gap: 40px;
            justify-content: center;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 500;
            margin-top: 2px;
        }

        .url {
            position: absolute;
            bottom: 30px;
            right: 40px;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 500;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body>
    <div class="og-card">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>

        <div class="content">
            <div class="badge">bkankim.github.io</div>
            <div class="name">Byeonghyeon Kim</div>
            <div class="role">AI & Security Specialist</div>
            <div class="stats">
                <div class="stat">
                    <div class="stat-number">19+</div>
                    <div class="stat-label">Projects</div>
                </div>
                <div class="stat">
                    <div class="stat-number">15</div>
                    <div class="stat-label">AI Agents</div>
                </div>
                <div class="stat">
                    <div class="stat-number">2+</div>
                    <div class="stat-label">Products</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
